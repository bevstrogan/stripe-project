{% extends 'store/base.html' %}
{% block content %}
<main>
        <div class="row row-cols-1 row-cols-md-3 mb-3 text-center">
            {% for item in items %}
            <div class="col">
                <div class="card mb-4 rounded-3 shadow-sm">
                    <div class="card-header py-3"><h4 class="my-0 fw-normal">{{item.name}}</h4></div>
                    <div class="card-body"><h1 class="card-title pricing-card-title">{{item.price}}<small
                            class="text-body-secondary fw-light"> {{item.currency}}</small></h1>
                        <a type="button" class="w-100 btn btn-lg btn-success mb-2" href="{% url 'store:buy' item.pk %}" >Buy</a>
                        <a type="button" class="w-100 btn btn-lg btn-primary" href="{% url 'store:items_detail' item.pk %}" >Details</a>
                    </div>

                </div>
            </div>
            {% endfor %}
        </div>
    </main>
{% endblock %}
